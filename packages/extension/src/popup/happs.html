<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fishy - Installed hApps</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .nav {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #e5e7eb;
    }

    .nav a {
      color: #667eea;
      text-decoration: none;
      margin-right: 15px;
      font-size: 14px;
    }

    .nav a:hover {
      text-decoration: underline;
    }

    .open-window-link {
      background: #667eea;
      color: white !important;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      text-decoration: none !important;
    }

    .open-window-link:hover {
      background: #5568d3;
    }

    .stats {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .stat {
      background: #f3f4f6;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      color: #6b7280;
    }

    .stat strong {
      color: #111827;
    }

    .content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #6b7280;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .happ-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .happ-card {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 15px;
      transition: all 0.2s;
    }

    .happ-card:hover {
      border-color: #667eea;
      box-shadow: 0 2px 4px rgba(102, 126, 234, 0.1);
    }

    .happ-card.disabled {
      opacity: 0.6;
      background: #f9fafb;
    }

    .happ-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 10px;
    }

    .happ-title {
      flex: 1;
    }

    .happ-name {
      font-size: 16px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 4px;
    }

    .happ-domain {
      font-size: 13px;
      color: #6b7280;
      word-break: break-all;
    }

    .happ-status {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .status-badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-badge.enabled {
      background: #d1fae5;
      color: #065f46;
    }

    .status-badge.disabled {
      background: #fee2e2;
      color: #991b1b;
    }

    .happ-details {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 12px;
      padding: 10px;
      background: #f9fafb;
      border-radius: 6px;
      font-size: 13px;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .detail-label {
      color: #6b7280;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-value {
      color: #111827;
      font-family: monospace;
      font-size: 12px;
      word-break: break-all;
    }

    .pubkey {
      font-size: 11px;
      cursor: pointer;
      position: relative;
    }

    .pubkey:hover {
      color: #667eea;
    }

    .pubkey.copied::after {
      content: 'Copied!';
      position: absolute;
      left: 0;
      top: -20px;
      background: #111827;
      color: white;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
      white-space: nowrap;
    }

    .happ-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button.primary {
      background: #667eea;
      color: white;
    }

    button.primary:hover {
      background: #5568d3;
    }

    button.secondary {
      background: #e5e7eb;
      color: #374151;
    }

    button.secondary:hover {
      background: #d1d5db;
    }

    button.danger {
      background: #ef4444;
      color: white;
    }

    button.danger:hover {
      background: #dc2626;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button:disabled:hover {
      transform: none;
    }

    .message {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .message.success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #6b7280;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Debug section styles */
    .debug-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed #e5e7eb;
    }

    .debug-status {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .debug-status .badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .debug-status .badge.pending {
      background: #fef3c7;
      color: #92400e;
    }

    .debug-status .badge.in-flight {
      background: #dbeafe;
      color: #1e40af;
    }

    .debug-status .badge.failed {
      background: #fee2e2;
      color: #991b1b;
    }

    .debug-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .debug-actions button {
      padding: 6px 12px;
      font-size: 12px;
    }

    /* Linker status styles */
    .linker-status {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-indicator.connected {
      background: #10b981;
      box-shadow: 0 0 6px #10b981;
    }

    .status-indicator.disconnected {
      background: #ef4444;
    }

    .status-indicator.unknown {
      background: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🐟 Installed hApps</h1>
      <div class="stats">
        <div class="stat">
          <strong id="totalCount">0</strong> total
        </div>
        <div class="stat">
          <strong id="enabledCount">0</strong> enabled
        </div>
        <div class="stat">
          <strong id="disabledCount">0</strong> disabled
        </div>
        <div class="stat linker-status">
          <span class="status-indicator disconnected" id="httpIndicator"></span>
          <span id="httpStatusText">HTTP: ...</span>
        </div>
        <div class="stat linker-status">
          <span class="status-indicator disconnected" id="wsIndicator"></span>
          <span id="wsStatusText">WS: ...</span>
        </div>
      </div>
      <div class="nav">
        <a href="index.html">← Back to Home</a>
        <a href="lair.html">Lair Keystore</a>
        <a href="permissions.html">Permissions</a>
        <a href="#" id="openInWindow" class="open-window-link">Open in Window ↗</a>
      </div>
    </div>

    <div class="content">
      <div id="message"></div>
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p style="margin-top: 10px;">Loading hApps...</p>
      </div>
      <div id="emptyState" class="empty-state" style="display: none;">
        <div class="empty-state-icon">📦</div>
        <h3>No hApps Installed</h3>
        <p>Install a hApp from a web page to see it here.</p>
      </div>
      <div id="happList" class="happ-list" style="display: none;"></div>
    </div>
  </div>

  <script type="module" src="./happs.ts"></script>
</body>
</html>
