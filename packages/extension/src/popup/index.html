<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holochain</title>
    <style>
      body {
        width: 300px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        margin: 0;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 12px 0;
        color: #333;
      }
      .status {
        padding: 8px 12px;
        border-radius: 4px;
        font-size: 14px;
        margin-bottom: 12px;
      }
      .status.connected {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .status.disconnected {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      .info {
        font-size: 12px;
        color: #666;
      }
      .nav {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid #ddd;
      }
      .nav a {
        display: block;
        padding: 8px 12px;
        background: #007bff;
        color: white;
        text-decoration: none;
        border-radius: 4px;
        text-align: center;
        font-size: 14px;
        margin-bottom: 8px;
      }
      .nav a:hover {
        background: #0056b3;
      }
      .warning {
        background: #fff3cd;
        color: #856404;
        border: 1px solid #ffc107;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 12px;
        margin-bottom: 12px;
      }
      .warning a {
        color: #856404;
        font-weight: bold;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>Holochain</h1>
    <div id="status" class="status disconnected">
      Status: <span id="status-text">Loading...</span>
    </div>
    <div class="info">
      <div id="active-page">No active page</div>
    </div>
    <div id="storage-warning" class="warning hidden">
      <strong>Storage not persistent.</strong> Browser data may be cleared on extension uninstall.
      <a href="lair.html">Back up your seed phrase</a> to protect your identity.
    </div>
    <div class="nav">
      <a href="happs.html">Installed hApps</a>
      <a href="lair.html">Manage Lair Keystore</a>
      <a href="permissions.html">Manage Permissions</a>
    </div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
