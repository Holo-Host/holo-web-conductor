<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fishy - Holochain in the Browser</title>
    <style>
      body {
        width: 300px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        margin: 0;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 12px 0;
        color: #333;
      }
      .status {
        padding: 8px 12px;
        border-radius: 4px;
        font-size: 14px;
        margin-bottom: 12px;
      }
      .status.connected {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .status.disconnected {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      .info {
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>Fishy</h1>
    <div id="status" class="status disconnected">
      Status: <span id="status-text">Loading...</span>
    </div>
    <div class="info">
      <div id="active-page">No active page</div>
    </div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
