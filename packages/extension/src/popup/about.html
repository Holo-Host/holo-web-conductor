<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About - Holo Web Conductor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f9fa;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      gap: 12px;
    }

    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 4px 4px 0;
      margin-left: -2px;
      color: #6b7280;
      display: flex;
      align-items: center;
    }

    .back-btn:hover { color: #111827; }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #333;
    }

    .about-content {
      padding: 16px;
    }

    .about-logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .about-logo img {
      width: 56px;
      height: 56px;
    }

    .about-logo h2 {
      font-size: 17px;
      color: #111827;
      margin-top: 10px;
    }

    .about-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      font-size: 13px;
      border-bottom: 1px solid #f0f0f0;
    }

    .about-row:last-of-type {
      border-bottom: none;
    }

    .about-label {
      color: #6b7280;
    }

    .about-value {
      color: #111827;
      font-weight: 500;
    }

    .about-footer {
      margin-top: 24px;
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <img src="../icons/holo-mark.svg" alt="" style="width: 26px; height: 20px; object-fit: contain;" />
    <span class="header-title">Holo Web Conductor: About</span>
  </div>

  <div class="about-content">
    <div class="about-row">
      <span class="about-label">Version</span>
      <span class="about-value" id="about-version">0.1.0</span>
    </div>
    <div class="about-row">
      <span class="about-label">License</span>
      <span class="about-value">CAL-1.0</span>
    </div>
    <div class="about-row">
      <span class="about-label">Runtime</span>
      <span class="about-value" id="about-browser">Chrome</span>
    </div>

    <div class="about-footer">
      &copy; Holo Ltd.<br>
      Holochain in the browser.
    </div>
  </div>

  <script type="module" src="./about.ts"></script>
</body>
</html>
