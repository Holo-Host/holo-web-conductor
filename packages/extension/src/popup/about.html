<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About - Holo Web Conductor</title>
  <link rel="stylesheet" href="header.css" />
  <style>

    .about-content {
      padding: 16px;
    }

    .about-logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .about-logo img {
      width: 56px;
      height: 56px;
    }

    .about-logo h2 {
      font-size: 17px;
      color: #111827;
      margin-top: 10px;
    }

    .about-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      font-size: 13px;
      border-bottom: 1px solid #f0f0f0;
    }

    .about-row:last-of-type {
      border-bottom: none;
    }

    .about-label {
      color: #6b7280;
    }

    .about-value {
      color: #111827;
      font-weight: 500;
    }

    .about-footer {
      margin-top: 24px;
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="hwc-header">
    <a href="index.html" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <img src="../icons/holo-mark.svg" alt="" class="header-logo" />
    <span class="header-title">Holo Web Conductor: About</span>
  </div>

  <div class="about-content">
    <div class="about-row">
      <span class="about-label">Version</span>
      <span class="about-value" id="about-version">0.1.0</span>
    </div>
    <div class="about-row">
      <span class="about-label">License</span>
      <span class="about-value"><a href="https://opensource.org/license/CAL-1.0" target="_blank" rel="noopener" style="color: #017FF8; text-decoration: none;">CAL-1.0</a></span>
    </div>
    <div class="about-row">
      <span class="about-label">Runtime</span>
      <span class="about-value" id="about-browser">Chrome</span>
    </div>

    <div class="about-footer">
      &copy; <a href="https://holo.host" target="_blank" rel="noopener" style="color: #9ca3af;">Holo</a> Ltd.<br>
      <a href="https://www.holochain.org" target="_blank" rel="noopener" style="color: #9ca3af;">Holochain</a> in the browser.
    </div>
  </div>

  <script type="module" src="./about.ts"></script>
</body>
</html>
