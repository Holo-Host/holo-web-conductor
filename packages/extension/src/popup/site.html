<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Details - Holo Web Conductor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      min-width: 340px;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      gap: 12px;
    }

    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 4px 4px 0;
      margin-left: -2px;
      color: #6b7280;
      display: flex;
      align-items: center;
    }

    .back-btn:hover {
      color: #111827;
    }

    .header-domain {
      flex: 1;
      min-width: 0;
    }

    .header-hostname {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-origin {
      font-size: 13px;
      color: #374151;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .permission-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
    }

    .permission-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .permission-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .permission-badge.granted {
      background: #d1fae5;
      color: #065f46;
    }

    .permission-badge.denied {
      background: #fee2e2;
      color: #991b1b;
    }

    .permission-date {
      font-size: 12px;
      color: #6b7280;
    }

    .revoke-btn {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      color: #374151;
      cursor: pointer;
      transition: all 0.15s;
    }

    .revoke-btn:hover {
      background: #fee2e2;
      border-color: #fca5a5;
      color: #dc2626;
    }

    .section-title {
      padding: 12px 16px 8px;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .happ-list {
      padding: 0 8px 8px;
    }

    .happ-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }

    .happ-card:hover {
      border-color: #c7d2fe;
    }

    .happ-card.disabled {
      opacity: 0.6;
      background: #fafafa;
    }

    /* Header */
    .happ-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .happ-title {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .happ-name {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
    }

    .happ-version {
      font-size: 12px;
      color: #6b7280;
      white-space: nowrap;
    }

    .happ-status {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    .status-badge {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-badge.enabled {
      background: #d1fae5;
      color: #065f46;
    }

    .status-badge.disabled {
      background: #fee2e2;
      color: #991b1b;
    }

    .status-badge.awaiting {
      background: #fef3c7;
      color: #92400e;
    }

    /* Toggle slider */
    .toggle {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }

    .toggle-input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 10px;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-input:checked + .toggle-slider {
      background: #4f46e5;
    }

    .toggle-input:checked + .toggle-slider::before {
      transform: translateX(16px);
    }

    /* Details */
    .happ-details {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px;
      background: #f9fafb;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .detail-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .detail-sep {
      width: 1px;
      height: 12px;
      background: #d1d5db;
    }

    .detail-label {
      color: #6b7280;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-value {
      color: #111827;
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
    }

    .dna-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .dna-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 8px;
    }

    .dna-name {
      color: #111827;
      font-weight: 500;
    }

    .dna-hash {
      font-family: monospace;
      color: #4b5563;
      cursor: pointer;
    }

    .dna-hash:hover {
      color: #4f46e5;
    }

    .dna-seed {
      font-size: 11px;
      color: #9ca3af;
      font-family: monospace;
    }

    .pubkey, .dna-hash {
      position: relative;
    }

    .pubkey {
      cursor: pointer;
    }

    .pubkey:hover {
      color: #4f46e5;
    }

    .pubkey.copied::after,
    .dna-hash.copied::after {
      content: 'Copied';
      position: absolute;
      left: 0;
      top: -18px;
      background: #111827;
      color: white;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
    }

    /* Expandable sections */
    .section-toggle {
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 0;
      list-style: none;
      user-select: none;
    }

    .section-toggle::-webkit-details-marker {
      display: none;
    }

    .section-toggle::before {
      content: '\25B6';
      display: inline-block;
      margin-right: 6px;
      font-size: 8px;
      transition: transform 0.2s;
    }

    details[open] > .section-toggle::before {
      transform: rotate(90deg);
    }

    .section-content {
      padding: 8px 0 4px 0;
    }

    .section-debug {
      border-top: 1px solid #e5e7eb;
      margin-top: 8px;
    }

    .subsection {
      margin-bottom: 12px;
    }

    .subsection-title {
      font-size: 10px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .debug-status {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }

    .badge-pending {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-inflight {
      background: #dbeafe;
      color: #1e40af;
    }

    .badge-failed {
      background: #fee2e2;
      color: #991b1b;
    }

    .debug-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    /* Danger zone */
    .section-danger {
      border-top: 1px solid #e5e7eb;
      margin-top: 4px;
    }

    .danger-toggle {
      color: #991b1b;
    }

    .danger-content {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    button:hover {
      filter: brightness(0.95);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button.primary {
      background: #017FF8;
      color: white;
    }

    button.primary:hover {
      background: #0166d4;
    }

    button.secondary {
      background: #6c757d;
      color: white;
    }

    button.secondary:hover {
      background: #545b62;
    }

    button.danger {
      background: #dc3545;
      color: white;
    }

    button.danger:hover {
      background: #c82333;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #6b7280;
      font-size: 13px;
    }

    .message {
      margin: 8px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .message.success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <img src="../icons/holo-mark.svg" alt="" style="width: 26px; height: 20px; object-fit: contain; flex-shrink: 0;" />
    <div class="header-domain">
      <div class="header-hostname" id="site-hostname">Loading...</div>
      <div class="header-origin" id="site-origin"></div>
    </div>
  </div>

  <div class="permission-bar" id="permission-bar">
    <div class="permission-info">
      <span class="permission-badge granted" id="permission-badge">Granted</span>
      <span class="permission-date" id="permission-date"></span>
    </div>
    <button class="revoke-btn" id="revoke-btn">Revoke</button>
  </div>

  <div id="message"></div>

  <div class="section-title">Installed hApps</div>

  <div class="happ-list" id="happ-list"></div>
  <div id="empty-happs" class="empty-state hidden">
    No hApps installed from this site.
  </div>

  <script type="module" src="./site.ts"></script>
</body>
</html>
