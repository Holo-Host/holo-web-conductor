<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Details - Holo Web Conductor</title>
  <link rel="stylesheet" href="header.css" />
  <style>

    .site-favicon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: #e0e7ff;
      color: #4f46e5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .site-info {
      flex: 1;
      min-width: 0;
    }

    .site-title {
      font-size: 13px;
      font-weight: 500;
      color: #111827;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .site-url {
      font-size: 11px;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .site-status {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .site-date {
      font-size: 11px;
      color: #9ca3af;
      text-align: right;
      white-space: nowrap;
    }

    .disconnect-btn {
      background: none;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      cursor: pointer;
      padding: 5px;
      color: #6b7280;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .disconnect-btn:hover {
      background: #fee2e2;
      border-color: #fca5a5;
      color: #dc2626;
    }


    .section-title {
      padding: 12px 16px 8px;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .happ-list {
      padding: 0 8px 8px;
    }

    .happ-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }

    .happ-card:hover {
      border-color: #c7d2fe;
    }

    .happ-card.disabled {
      opacity: 0.6;
      background: #fafafa;
    }

    /* Header */
    .happ-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .happ-title {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .happ-name {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
    }

    .happ-version {
      font-size: 12px;
      color: #6b7280;
      white-space: nowrap;
    }

    .happ-status {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    .status-badge {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-badge.enabled {
      background: #d1fae5;
      color: #065f46;
    }

    .status-badge.disabled {
      background: #fee2e2;
      color: #991b1b;
    }

    .status-badge.awaiting {
      background: #fef3c7;
      color: #92400e;
    }

    /* Toggle slider */
    .toggle {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }

    .toggle-input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 10px;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-input:checked + .toggle-slider {
      background: #4f46e5;
    }

    .toggle-input:checked + .toggle-slider::before {
      transform: translateX(16px);
    }

    /* Details */
    .happ-details {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px;
      background: #f9fafb;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .detail-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .detail-sep {
      width: 1px;
      height: 12px;
      background: #d1d5db;
    }

    .detail-label {
      color: #6b7280;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-value {
      color: #111827;
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
    }

    .dna-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .dna-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 8px;
    }

    .dna-name {
      color: #111827;
      font-weight: 500;
    }

    .dna-hash {
      font-family: monospace;
      color: #4b5563;
      cursor: pointer;
    }

    .dna-hash:hover {
      color: #4f46e5;
    }

    .dna-seed {
      font-size: 11px;
      color: #9ca3af;
      font-family: monospace;
    }

    .pubkey, .dna-hash {
      position: relative;
    }

    .pubkey {
      cursor: pointer;
    }

    .pubkey:hover {
      color: #4f46e5;
    }

    .pubkey.copied::after,
    .dna-hash.copied::after {
      content: 'Copied';
      position: absolute;
      left: 0;
      top: -18px;
      background: #111827;
      color: white;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
    }

    /* Expandable sections */
    .section-toggle {
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 0;
      list-style: none;
      user-select: none;
    }

    .section-toggle::-webkit-details-marker {
      display: none;
    }

    .section-toggle::before {
      content: '\25B6';
      display: inline-block;
      margin-right: 6px;
      font-size: 8px;
      transition: transform 0.2s;
    }

    details[open] > .section-toggle::before {
      transform: rotate(90deg);
    }

    .section-content {
      padding: 8px 0 4px 0;
    }

    .section-debug {
      border-top: 1px solid #e5e7eb;
      margin-top: 8px;
    }

    .subsection {
      margin-bottom: 12px;
    }

    .subsection-title {
      font-size: 10px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .debug-status {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }

    .badge-pending {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-inflight {
      background: #dbeafe;
      color: #1e40af;
    }

    .badge-failed {
      background: #fee2e2;
      color: #991b1b;
    }

    .debug-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    /* Danger zone */
    .section-danger {
      border-top: 1px solid #e5e7eb;
      margin-top: 4px;
    }

    .danger-toggle {
      color: #991b1b;
    }

    .danger-content {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }


    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #6b7280;
      font-size: 13px;
    }

    .message {
      margin: 8px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .message.success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="hwc-header">
    <a href="index.html" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <img src="../icons/holo-mark.svg" alt="" class="header-logo" />
    <span class="header-title">Holo Web Conductor:</span>
  </div>

  <div class="hwc-header-sub" id="site-bar">
    <div class="site-favicon" id="site-favicon" data-initial="">
      <img id="favicon-img" src="" alt="" style="width: 20px; height: 20px; border-radius: 4px;"
           onerror="this.style.display='none'; this.parentElement.textContent=this.parentElement.dataset.initial;" />
    </div>
    <div class="site-info">
      <div class="site-title" id="site-title">Loading...</div>
      <div class="site-url" id="site-origin"></div>
    </div>
    <div class="site-status">
      <span class="site-date" id="permission-date"></span>
      <button class="disconnect-btn" id="revoke-btn" title="Disconnect this site from the Holo Web Conductor">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
          <line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="message"></div>

  <div class="section-title">Installed hApps</div>

  <div class="happ-list" id="happ-list"></div>
  <div id="empty-happs" class="empty-state hidden">
    No hApps installed from this site.
  </div>

  <script type="module" src="./site.ts"></script>
</body>
</html>
