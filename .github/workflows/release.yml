name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: 0

jobs:
  build-and-release:
    name: Build & Release Extension
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # TODO: remove once @holo-host/joining-service is published to npm
      - uses: actions/checkout@v4
        with:
          repository: Holo-Host/joining-service
          path: _joining-service
      - name: "Link joining-service for file: dependency resolution"
        run: ln -sf "$GITHUB_WORKSPACE/_joining-service" "$(dirname $GITHUB_WORKSPACE)/joining-service"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/test-zome

      - run: npm ci

      - name: Run tests
        run: npm test --workspaces --if-present

      - name: Package extension
        run: npm run release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
