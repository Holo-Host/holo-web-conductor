name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TODO: remove once @holo-host/joining-service is published to npm
      - uses: actions/checkout@v4
        with:
          repository: Holo-Host/joining-service
          path: _joining-service
      - name: "Link joining-service for file: dependency resolution"
        run: ln -sf "$GITHUB_WORKSPACE/_joining-service" "$(dirname $GITHUB_WORKSPACE)/joining-service"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/test-zome

      - run: npm ci

      - name: Build joining-service client types
        working-directory: ${{ github.workspace }}/_joining-service
        run: |
          # lair is a file: dep pointing at ../holo-web-conductor/packages/lair
          ln -sf "$GITHUB_WORKSPACE" "$(dirname $GITHUB_WORKSPACE)/holo-web-conductor"
          npm ci
          # Only client types are needed; server code has unresolvable deps in CI.
          # Redirect tsc output to avoid GitHub annotations from joining-service
          # type errors that are not relevant to HWC (e.g. missing server-only deps).
          npx tsc > /dev/null 2>&1 || true

      - name: Test
        run: npm test
