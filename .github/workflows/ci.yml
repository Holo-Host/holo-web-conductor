name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TODO: remove once @holo-host/joining-service is published to npm
      - uses: actions/checkout@v4
        with:
          repository: Holo-Host/joining-service
          path: _joining-service
      - name: "Link joining-service for file: dependency resolution"
        run: ln -sf "$GITHUB_WORKSPACE/_joining-service" "$(dirname $GITHUB_WORKSPACE)/joining-service"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/test-zome

      - run: npm ci

      - name: Build joining-service types
        run: cd "$(dirname $GITHUB_WORKSPACE)/joining-service" && npm ci && npm run build

      - name: Build workspace packages for cross-references
        run: |
          for pkg in shared lair core; do
            (cd packages/$pkg && npx tsc --composite false --noCheck)
          done
          npm run build --workspace=@hwc/extension

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test --workspaces --if-present

      - name: Integration tests
        run: npm run test:integration
