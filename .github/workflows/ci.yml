name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build workspace packages for cross-references
        run: |
          for pkg in shared lair core; do
            (cd packages/$pkg && npx tsc --composite false --noCheck)
          done
          npm run build --workspace=@hwc/extension

      - name: Unit tests
        run: npm test --workspaces --if-present
